- name: Deploy Docker Container
  hosts: websever
  become: true

  tasks:

    - name: Login to JFrog
      docker_login:
        registry_url: trialtypobk.jfrog.io
        username: "{{ jfrog_user }}"
        password: "{{ jfrog_pass }}"

    # 🔥 Kill ANY container using port 8080
    - name: Kill containers using port 8080
      shell: |
        docker ps -q --filter "publish=8080" | xargs -r docker stop
        docker ps -a -q --filter "publish=8080" | xargs -r docker rm
      ignore_errors: yes

    # 🔥 Remove container by name also (safety)
    - name: Remove existing myapp container if exists
      docker_container:
        name: myapp
        state: absent
      ignore_errors: yes

    # 🔥 Run new container
    - name: Run new container
      docker_container:
        name: myapp
        image: "{{ image }}"
        state: started
        recreate: yes
        ports:
          - "8080:8080"
