- name: Deploy Docker Container
  hosts: websever
  become: true

  tasks:

    - name: login to jfrog
      docker_login:
        registry_url: trialtypobk.jfrog.io
        username: "{{ jfrog_user }}"
        password: "{{ jfrog_pass }}"

    - name: Stop existing container if running
      docker_container:
        name: myapp
        state: stopped
      ignore_errors: yes

    - name: Remove existing container
      docker_container:
        name: myapp
        state: absent
      ignore_errors: yes

    - name: Run new container
      docker_container:
        name: myapp
        image: "{{ image }}"
        state: started
        recreate: yes
        ports:
          - "8080:8080"
