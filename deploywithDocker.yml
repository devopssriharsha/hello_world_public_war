- name: Deploy Docker Container
  hosts: websever
  become: true

  tasks:

    - name: Login to JFrog
      docker_login:
        registry_url: trialtypobk.jfrog.io
        username: "{{ jfrog_user }}"
        password: "{{ jfrog_pass }}"

    - name: Remove old container
      docker_container:
        name: myapp
        state: absent
      ignore_errors: yes

    - name: Run new container
      docker_container:
        name: myapp
        image: "{{ image }}"
        state: started
        recreate: yes
        ports:
          - "8081:8080"   # ✅ FIXED
